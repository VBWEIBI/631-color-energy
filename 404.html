<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA 404 redirect - Improved version
        // This handles the redirect more reliably
        
        (function() {
            // Get the current location
            var l = window.location;
            var path = l.pathname + l.search + l.hash;
            
            // Store in sessionStorage for index.html to retrieve
            sessionStorage.redirect = path;
            
            // Debug logging (can be removed)
            console.log('404.html: Redirecting from', path, 'to index.html');
            
            // Replace the current history entry and navigate
            // Using replace() instead of href to avoid adding to history
            l.replace('/631-color-energy/index.html');
        })();
    </script>
    <meta http-equiv="refresh" content="0;url=/631-color-energy/index.html">
</head>
<body>
    <p>Redirecting to home page...</p>
    <p><a href="/631-color-energy/">Click here if you are not redirected</a></p>
</body>
</html>
